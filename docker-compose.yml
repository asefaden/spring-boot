version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=https://spring.app.aletcloud.com/api/services
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge
